name: Ask a question
description: Ask a question about the curated reference, a listed resource, or how the pieces fit together.
title: "[Question]: "
labels:
  - question
  - triage
body:
  - type: markdown
    attributes:
      value: |
        For security questions, please email **security@cryptorefills.com** instead of opening a public issue.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: State your question as clearly as possible.
      placeholder: e.g. How does x402 settlement on Base interact with refund flows for partially redeemed gift cards?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? What is your role (merchant, agent developer, protocol author, researcher)?
      placeholder: |
        Goal:
        Role:
        Stack:
    validations:
      required: true
  - type: textarea
    id: what_you_tried
    attributes:
      label: What you have already tried or read
      description: Optional. Links to specs, docs, or repo pages you already consulted help us avoid repeating ground.
      placeholder: |
        - https://...
        - https://...
    validations:
      required: false
